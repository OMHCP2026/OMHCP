<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - MindCare</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="appointments.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Toast Notification -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Notification</span>
</div>

<div class="container">
    
    <!-- Header -->
    <div class="header">
        <h1>
            <i class="fas fa-calendar-check"></i>
            My Appointments
        </h1>
        <a href="patient-dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Back to Dashboard
        </a>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-calendar-alt stat-icon"></i>
            <div class="stat-info">
                <h3>Total</h3>
                <p id="totalCount">0</p>
            </div>
        </div>
        <div class="stat-card">
            <i class="fas fa-clock stat-icon"></i>
            <div class="stat-info">
                <h3>Upcoming</h3>
                <p id="upcomingCount">0</p>
            </div>
        </div>
        <div class="stat-card">
            <i class="fas fa-check-circle stat-icon"></i>
            <div class="stat-info">
                <h3>Completed</h3>
                <p id="completedCount">0</p>
            </div>
        </div>
        <div class="stat-card">
            <i class="fas fa-times-circle stat-icon"></i>
            <div class="stat-info">
                <h3>Cancelled</h3>
                <p id="cancelledCount">0</p>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="filterAppointments('all')">
            <i class="fas fa-list"></i> All
        </button>
        <button class="tab-btn" onclick="filterAppointments('upcoming')">
            <i class="fas fa-clock"></i> Upcoming
        </button>
        <button class="tab-btn" onclick="filterAppointments('completed')">
            <i class="fas fa-check-circle"></i> Completed
        </button>
        <button class="tab-btn" onclick="filterAppointments('cancelled')">
            <i class="fas fa-times-circle"></i> Cancelled
        </button>
    </div>

    <!-- Filters -->
    <div class="filters">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by doctor name...">
        </div>
        
        <select class="filter-select" id="monthFilter">
            <option value="all">All Months</option>
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
        </select>

        <button class="reset-btn" onclick="resetFilters()">
            <i class="fas fa-redo-alt"></i> Reset
        </button>
    </div>

    <!-- Appointments List -->
    <div class="appointments-list">
        <div class="list-header">
            <h2>
                <i class="fas fa-calendar-alt"></i>
                Your Appointments
            </h2>
            <span class="count-badge" id="appointmentCount">0</span>
        </div>

        <div id="appointmentsContainer">
            <!-- Loading Spinner -->
            <div class="loading" id="loadingSpinner">
                <div class="spinner"></div>
                <p>Loading appointments...</p>
            </div>
        </div>
    </div>
</div>

<!-- Cancel Confirmation Modal -->
<div class="modal" id="cancelModal">
    <div class="modal-content">
        <div class="modal-header" style="background: #dc3545;">
            <h3><i class="fas fa-exclamation-triangle"></i> Cancel Appointment</h3>
            <button class="close-btn" onclick="closeCancelModal()">&times;</button>
        </div>
        <div class="modal-body" style="text-align: center;">
            <i class="fas fa-question-circle" style="font-size: 60px; color: #dc3545; margin-bottom: 20px;"></i>
            <p style="margin-bottom: 20px;">Are you sure you want to cancel this appointment?</p>
            <input type="hidden" id="cancelId">
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeCancelModal()">No, Keep it</button>
            <button class="btn-primary" style="background: #dc3545;" onclick="confirmCancel()">Yes, Cancel</button>
        </div>
    </div>
</div>

<!-- JavaScript -->
<script src="appointments.js"></script>

</body>
</html>
