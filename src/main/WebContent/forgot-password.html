<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .btn:disabled {
            background: #b3b9ff;
            cursor: not-allowed;
        }
        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .message.success {
            background-color: #f0f4ff;
            color: #2c3e50;
            border-left: 4px solid #667eea;
            display: block;
        }
        .message.error {
            background-color: #fee;
            color: #c33;
            border-left: 4px solid #c33;
            display: block;
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Forgot Password?</h2>
        <p class="subtitle">No worries! Enter your email and we'll send you a reset link.</p>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">
                <span id="btnText">Send reset link</span>
            </button>
        </form>

        <div id="messageBox" class="message"></div>

        <div class="back-link">
            <a href="#" id="backToLogin">← Back to Login</a>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('forgotPasswordForm');
            const emailInput = document.getElementById('email');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const messageBox = document.getElementById('messageBox');
            const backLink = document.getElementById('backToLogin');

            // Helper to show messages
            function showMessage(text, type = 'success') {
                messageBox.textContent = text;
                messageBox.className = `message ${type}`;
            }

            // Basic email validation
            function isValidEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            // Handle form submission
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = emailInput.value.trim();

                if (!email) {
                    showMessage('Please enter your email address.', 'error');
                    return;
                }
                if (!isValidEmail(email)) {
                    showMessage('Please enter a valid email address.', 'error');
                    return;
                }

                submitBtn.disabled = true;
                btnText.innerHTML = '<span class="spinner"></span> Sending...';

                try {
                    // Simulate network request
                    await new Promise(resolve => setTimeout(resolve, 1500));

                    // Generic success message for security
                    showMessage('✅ If that email is registered, we’ll send a reset link shortly.', 'success');
                    emailInput.value = '';
                } catch (error) {
                    showMessage('Something went wrong. Please try again later.', 'error');
                } finally {
                    submitBtn.disabled = false;
                    btnText.innerHTML = 'Send reset link';
                }
            });

            // Clear message when typing
            emailInput.addEventListener('input', function() {
                if (messageBox.classList.contains('error') || messageBox.classList.contains('success')) {
                    messageBox.style.display = 'none';
                    messageBox.className = 'message';
                }
            });

            // 🔧 FIX: Make "Back to Login" work (goes to previous page)
            backLink.addEventListener('click', function(e) {
                e.preventDefault();  // Prevent jumping to top
                window.history.back(); // Go back to login page (or previous page)
                // If you want to redirect to a specific login page, replace the line above with:
                // window.location.href = '/login';  // or 'login.html'
            });
        })();
    </script>
</body>
</html>
