<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Settings · MindCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f0f4f8; min-height:100vh; }

    .topbar { background:#1f4e8c; color:#fff; padding:16px 28px; display:flex; align-items:center; gap:14px; box-shadow:0 2px 8px rgba(0,0,0,.15); }
    .topbar h1 { font-size:1.15rem; font-weight:700; }
    .topbar a  { color:rgba(255,255,255,.7); text-decoration:none; display:flex; align-items:center; gap:6px; font-size:.85rem; transition:.2s; }
    .topbar a:hover { color:#fff; }

    .container { max-width:820px; margin:32px auto; padding:0 20px 60px; }

    .profile-header {
      background:#fff; border-radius:16px; padding:28px;
      display:flex; align-items:center; gap:22px;
      box-shadow:0 2px 12px rgba(0,0,0,.07); margin-bottom:22px; flex-wrap:wrap;
    }
    .avatar-wrap    { position:relative; flex-shrink:0; }
    .avatar-circle  {
      width:88px; height:88px; border-radius:50%;
      background:linear-gradient(135deg,#1f4e8c,#7bb3ff);
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:1.9rem; font-weight:700; cursor:pointer; overflow:hidden;
    }
    .avatar-circle img { width:100%; height:100%; object-fit:cover; }
    .avatar-edit-btn {
      position:absolute; bottom:0; right:0; width:26px; height:26px; border-radius:50%;
      background:#1f4e8c; color:#fff; border:2px solid #fff;
      display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:.6rem;
    }
    #photoInput { display:none; }
    .profile-meta h2   { font-size:1.25rem; color:#1f2937; font-weight:700; }
    .profile-meta p    { color:#6b7280; font-size:.86rem; margin-top:4px; }
    .role-badge { display:inline-block; margin-top:8px; background:#dbeafe; color:#1d4ed8; padding:3px 12px; border-radius:20px; font-size:.76rem; font-weight:600; }

    .section-card { background:#fff; border-radius:16px; padding:26px; box-shadow:0 2px 12px rgba(0,0,0,.07); margin-bottom:18px; }
    .section-card h3 { font-size:.98rem; font-weight:700; color:#1f2937; margin-bottom:18px; padding-bottom:10px; border-bottom:2px solid #f0f4f8; display:flex; align-items:center; gap:8px; }
    .section-card h3 i { color:#1f4e8c; }

    .form-grid  { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-group.full { grid-column:1/-1; }
    label { font-size:.8rem; font-weight:600; color:#374151; }

    input[type="text"], input[type="email"], input[type="tel"],
    input[type="password"], select, textarea {
      padding:10px 13px; border:1.5px solid #e5e7eb; border-radius:9px;
      font-size:.88rem; color:#1f2937; font-family:inherit; outline:none; transition:.2s;
    }
    input:focus, select:focus, textarea:focus { border-color:#1f4e8c; background:#f8fbff; }
    textarea { resize:vertical; min-height:80px; }

    .alert { padding:11px 15px; border-radius:9px; margin-bottom:14px; font-size:.87rem; display:none; }
    .alert.success { background:#d1fae5; color:#065f46; display:block; }
    .alert.error   { background:#fee2e2; color:#991b1b; display:block; }

    .btn-row { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
    .btn { padding:10px 22px; border-radius:9px; border:none; font-size:.88rem; font-weight:600; cursor:pointer; transition:.2s; display:inline-flex; align-items:center; gap:6px; }
    .btn-primary   { background:linear-gradient(135deg,#1f4e8c,#2563eb); color:#fff; }
    .btn-primary:hover { opacity:.88; transform:translateY(-1px); }
    .btn-secondary { background:#f3f4f6; color:#374151; border:1px solid #e5e7eb; }
    .btn-secondary:hover { background:#e5e7eb; }
    .btn-danger    { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    .btn-danger:hover { background:#fecaca; }

    .pwd-strength { margin-top:5px; height:4px; border-radius:4px; background:#e5e7eb; overflow:hidden; }
    .pwd-strength-bar { height:100%; border-radius:4px; transition:width .3s, background .3s; width:0; }

    @media(max-width:580px) {
      .form-grid { grid-template-columns:1fr; }
      .profile-header { flex-direction:column; text-align:center; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="counsellor-dashboard.html" id="backLink"><i class="fas fa-arrow-left"></i> Back</a>
    <h1><i class="fas fa-user-cog" style="margin-right:8px;"></i> Profile Settings</h1>
  </div>

  <div class="container">

    <!-- Header -->
    <div class="profile-header">
      <div class="avatar-wrap">
        <div class="avatar-circle" id="avatarCircle" onclick="document.getElementById('photoInput').click()">
          <span id="avatarInitials">DR</span>
        </div>
        <div class="avatar-edit-btn" onclick="document.getElementById('photoInput').click()">
          <i class="fas fa-camera"></i>
        </div>
        <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto(this)"/>
      </div>
      <div class="profile-meta">
        <h2 id="headerName">Loading…</h2>
        <p  id="headerEmail">—</p>
        <span class="role-badge" id="headerRole">Counsellor</span>
      </div>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- Personal Info -->
    <div class="section-card">
      <h3><i class="fas fa-user"></i> Personal Information</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Dr. Jane Doe"/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="jane@example.com"/>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210"/>
        </div>
        <div class="form-group">
          <label>Specialization</label>
          <select id="specialization">
            <option value="">Select…</option>
            <option>Clinical Psychology</option>
            <option>Counselling Psychology</option>
            <option>Child & Adolescent Therapy</option>
            <option>Marriage & Family Therapy</option>
            <option>Cognitive Behavioural Therapy</option>
            <option>Anxiety & Depression</option>
            <option>Trauma & PTSD</option>
            <option>General Mental Health</option>
          </select>
        </div>
        <div class="form-group">
          <label>Experience (years)</label>
          <input type="text" id="experience" placeholder="e.g. 5"/>
        </div>
        <div class="form-group">
          <label>Languages Spoken</label>
          <input type="text" id="languages" placeholder="e.g. English, Hindi"/>
        </div>
        <div class="form-group full">
          <label>Bio / About</label>
          <textarea id="bio" placeholder="Write a short bio…"></textarea>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="savePersonalInfo()"><i class="fas fa-save"></i> Save Changes</button>
        <button class="btn btn-secondary" onclick="loadProfile()"><i class="fas fa-undo"></i> Reset</button>
      </div>
    </div>

    <!-- Change Password -->
    <div class="section-card">
      <h3><i class="fas fa-lock"></i> Change Password</h3>
      <div class="form-grid">
        <div class="form-group full">
          <label>Current Password</label>
          <input type="password" id="currentPassword" placeholder="Enter current password"/>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPassword" placeholder="At least 8 characters" oninput="checkStrength(this.value)"/>
          <div class="pwd-strength"><div class="pwd-strength-bar" id="strengthBar"></div></div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter new password"/>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="changePassword()"><i class="fas fa-key"></i> Update Password</button>
      </div>
    </div>

    <!-- Danger Zone -->
    <div class="section-card">
      <h3><i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i> Danger Zone</h3>
      <p style="color:#6b7280;font-size:.86rem;margin-bottom:14px;">These actions are irreversible.</p>
      <div class="btn-row">
        <button class="btn btn-danger"
          onclick="if(confirm('Deactivate your account?')) deactivateAccount()">
          <i class="fas fa-user-slash"></i> Deactivate Account
        </button>
      </div>
    </div>

  </div>
  <script src="profile-settings.js"></script>
</body>
</html>
