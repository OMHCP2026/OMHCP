<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - MedCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f4f7fc 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 30px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: linear-gradient(135deg, #0f4c75, #3282b8);
            color: white;
            padding: 30px;
            position: relative;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .back-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-3px);
        }
        
        .profile-content {
            padding: 40px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .avatar-section {
            position: relative;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #0f4c75, #3282b8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .avatar i {
            font-size: 60px;
            color: white;
        }
        
        .change-photo-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #28a745;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid white;
            transition: all 0.3s;
        }
        
        .change-photo-btn:hover {
            background: #218838;
            transform: scale(1.1);
        }
        
        .user-info h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }
        
        .user-info .email {
            color: #666;
            margin-bottom: 10px;
        }
        
        .member-badge {
            background: #e3f2fd;
            color: #0f4c75;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
        }
        
        .form-section {
            margin-bottom: 30px;
        }
        
        .form-section h3 {
            color: #0f4c75;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            flex: 1;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #0f4c75;
            outline: none;
            box-shadow: 0 0 0 3px rgba(15,76,117,0.1);
        }
        
        .form-group input[readonly] {
            background: #f8f9fa;
            cursor: not-allowed;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0f4c75, #3282b8);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(15,76,117,0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #0f4c75;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 10000;
            animation: slideInRight 0.3s ease;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .toast.success {
            background: #28a745;
        }
        
        .toast.error {
            background: #dc3545;
        }
        
        .toast.info {
            background: #17a2b8;
        }
        
        .field-error {
            border-color: #dc3545 !important;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .form-row {
                flex-direction: column;
                gap: 10px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .back-btn {
                position: static;
                display: inline-block;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
    
    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-user-edit"></i> Edit Profile</h1>
            <p>Update your personal information</p>
            <a href="patient-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        
        <div class="profile-content">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="avatar-section">
                    <div class="avatar" id="avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="change-photo-btn" onclick="changePhoto()">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
                <div class="user-info">
                    <h2 id="displayName">Loading...</h2>
                    <div class="email" id="displayEmail">Loading...</div>
                    <span class="member-badge" id="memberSince"><i class="fas fa-calendar"></i> Loading...</span>
                </div>
            </div>
            
            <!-- Edit Form -->
            <form id="profileForm">
                <!-- Personal Information -->
                <div class="form-section">
                    <h3><i class="fas fa-user-circle"></i> Personal Information</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name <span style="color: #dc3545;">*</span></label>
                            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                            <div class="error-message" id="nameError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="email" name="email" readonly>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number" pattern="[0-9]{10}" maxlength="10">
                        </div>
                        
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" id="age" name="age" placeholder="Your age" min="1" max="120">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address" name="address" rows="3" placeholder="Enter your full address"></textarea>
                    </div>
                </div>
                
                <!-- Medical Information -->
                <div class="form-section">
                    <h3><i class="fas fa-notes-medical"></i> Medical Information</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Blood Group</label>
                            <select id="bloodGroup" name="bloodGroup">
                                <option value="">Select Blood Group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Emergency Contact</label>
                            <input type="tel" id="emergencyContact" name="emergencyContact" placeholder="Emergency contact number" pattern="[0-9]{10}" maxlength="10">
                        </div>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button type="submit" class="btn-primary" id="saveBtn">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='patient-dashboard.html'">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Global variables
        let originalData = {};
        
        // Load profile on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadProfile();
        });
        
        // Load profile from API
        function loadProfile() {
            showLoading();
            
            fetch('ProfileServlet', {
                method: 'GET',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                hideLoading();
                
                if (data.success) {
                    // Servant returns profile object, not user
                    displayProfile(data.profile);
                } else {
                    showToast(data.message || 'Failed to load profile', 'error');
                    if (data.message === 'Not logged in') {
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    }
                }
            })
            .catch(error => {
                hideLoading();
                console.error('Error:', error);
                showToast('Network error. Please try again.', 'error');
            });
        }
        
        // Display profile data in form
        function displayProfile(user) {
            originalData = user;
            
            document.getElementById('displayName').textContent = user.name || 'User';
            document.getElementById('displayEmail').textContent = user.email || '';
            const memberSince = user.memberSince || '2024';
            document.getElementById('memberSince').innerHTML = '<i class="fas fa-calendar"></i> Member since ' + memberSince;
            
            document.getElementById('name').value = user.name || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('phone').value = user.phone || '';   // servlet returns "phone"
            document.getElementById('age').value = user.age || '';
            document.getElementById('address').value = user.address || '';
            document.getElementById('bloodGroup').value = user.bloodGroup || '';
            document.getElementById('emergencyContact').value = user.emergencyContact || '';
        }
        
        // Handle form submission
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            clearErrors();
            
            if (!validateForm()) {
                return;
            }
            
            if (!hasChanges()) {
                showToast('No changes to save', 'info');
                return;
            }
            
            if (!confirm('Are you sure you want to save these changes?')) {
                return;
            }
            
            saveProfile();
        });
        
        // Validate form
        function validateForm() {
            let isValid = true;
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const age = document.getElementById('age').value;
            
            if (!name) {
                showError('name', 'Name is required');
                isValid = false;
            } else if (name.length < 3) {
                showError('name', 'Name must be at least 3 characters');
                isValid = false;
            }
            
            if (phone && !/^\d{10}$/.test(phone)) {
                showError('phone', 'Please enter a valid 10-digit number');
                isValid = false;
            }
            
            if (age && (age < 1 || age > 120)) {
                showError('age', 'Please enter a valid age');
                isValid = false;
            }
            
            return isValid;
        }
        
        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            field.classList.add('field-error');
            
            const errorDiv = document.getElementById(fieldId + 'Error');
            if (errorDiv) {
                errorDiv.textContent = message;
            }
        }
        
        function clearErrors() {
            document.querySelectorAll('.field-error').forEach(field => {
                field.classList.remove('field-error');
            });
            document.querySelectorAll('.error-message').forEach(div => {
                div.textContent = '';
            });
        }
        
        function hasChanges() {
            const currentData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                age: document.getElementById('age').value,
                address: document.getElementById('address').value,
                bloodGroup: document.getElementById('bloodGroup').value,
                emergencyContact: document.getElementById('emergencyContact').value
            };
            
            return JSON.stringify(originalData) !== JSON.stringify({
                ...originalData,
                ...currentData
            });
        }
        
        // Save profile using FormData (multipart)
        function saveProfile() {
            showLoading();
            
            const formData = new FormData();
            formData.append('action', 'updateProfile');
            formData.append('name', document.getElementById('name').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('age', document.getElementById('age').value);
            formData.append('address', document.getElementById('address').value);
            formData.append('bloodGroup', document.getElementById('bloodGroup').value);
            formData.append('emergencyContact', document.getElementById('emergencyContact').value);
            
            fetch('ProfileServlet', {
                method: 'POST',
                body: formData   // automatically sets correct multipart content type
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                
                if (data.success) {
                    showToast(data.message || 'Profile updated successfully!', 'success');
                    
                    originalData = {
                        ...originalData,
                        name: document.getElementById('name').value,
                        phone: document.getElementById('phone').value,
                        age: document.getElementById('age').value,
                        address: document.getElementById('address').value,
                        bloodGroup: document.getElementById('bloodGroup').value,
                        emergencyContact: document.getElementById('emergencyContact').value
                    };
                    
                    document.getElementById('displayName').textContent = document.getElementById('name').value;
                    
                    updateUserSession();
                    
                    setTimeout(() => {
                        window.location.href = 'patient-dashboard.html';
                    }, 2000);
                } else {
                    showToast(data.message || 'Failed to update profile', 'error');
                }
            })
            .catch(error => {
                hideLoading();
                console.error('Error:', error);
                showToast('Network error. Please try again.', 'error');
            });
        }
        
        function updateUserSession() {
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                age: document.getElementById('age').value
            };
            localStorage.setItem('user', JSON.stringify(userData));
        }
        
        function changePhoto() {
            showToast('Photo upload coming soon!', 'info');
        }
        
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
            document.getElementById('saveBtn').disabled = true;
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
            document.getElementById('saveBtn').disabled = false;
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toast.className = 'toast ' + type;
            toastMessage.textContent = message;
            
            toast.style.display = 'flex';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
