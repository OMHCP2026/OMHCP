<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register - MedCare</title>
<link rel="stylesheet" href="register.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="register-wrapper">

    <div class="register-left">
        <h1>MedCare Health</h1>
        <p>Join Our Healthcare Management System</p>
        <ul>
            <li><i class="fa-solid fa-check"></i> Secure Patient Records</li>
            <li><i class="fa-solid fa-check"></i> Easy Appointment Booking</li>
            <li><i class="fa-solid fa-check"></i> Doctor & Counsellor Access</li>
            <li><i class="fa-solid fa-check"></i> Safe & Encrypted System</li>
        </ul>
    </div>

    <div class="register-right">
        <h2>Create Account</h2>

        <form id="registerForm" action="RegisterServlet" method="post">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="text" name="contact" placeholder="Contact Number" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-calendar"></i>
                <input type="number" id="age" name="age" placeholder="Age" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-user-tag"></i>
                <select name="role" required>
                    <option value="">Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="counsellor">Counsellor</option>
                    <option value="patient">Patient</option>
                </select>
            </div>
            <button type="submit">Register</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>

</div>

<script src="register.js"></script>
</body>
</html>
